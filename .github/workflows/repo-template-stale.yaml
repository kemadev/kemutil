name: Housekeeping -  Repo template staleness check

on:
  schedule:
    # Each day at 3:00 AM
    - cron: 0 3 * * *
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  repo-template-stale-check:
    name: Repo template staleness check
    permissions:
      contents: read
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/kemadev/ci-cd:latest@sha256:6ce495f91dbaa89fd7915b18a76c4d095002dbce3ff2773f6897d5695ecc0de8
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.github_token }}
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Repo template staleness check
        id: repo-template-stale-check
        run: kema-runner repo-template-stale-check
